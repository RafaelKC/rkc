name: CI/CD Portfolio

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            # Clone or Pull code
            if [ ! -d "portfolio" ]; then
              git clone https://github.com/RafaelKC/rkc.git portfolio
            fi
            cd portfolio
            git pull origin main
            
            # Build e Swap do container
            docker build -t portfolio-site .
            docker stop portfolio-container || true
            docker rm portfolio-container || true
            docker run -d --name portfolio-container -p 80:80 portfolio-site
            
            # Limpeza de imagens antigas (crucial para instâncias free)
            docker image prune -f