<footer class="footer" role="contentinfo">
  <div class="container">
    <div class="footer-content">
      <p>
        <span aria-label="Copyright">©</span>
        {{ currentYear }} {{ USER_PROFILE.firstName }} {{ USER_PROFILE.lastName }}.
        {{ 'FOOTER.TEXT' | rkcTranslation }}
        <span role="img" [aria-label]="'FOOTER.COFFEE' | rkcTranslation">☕</span>
        {{ 'FOOTER.CODE' | rkcTranslation }}
      </p>
    </div>
  </div>
</footer>
